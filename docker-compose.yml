# Development infrastructure.
# Not required for local-mode development (in-memory adapters used by default).
#
# Usage:
#   docker compose up -d                            # Start all CPU services
#   docker compose --profile gpu up -d              # Start all services incl. TEI (GPU)
#   docker compose --profile gpu up -d tei-embedding tei-reranker  # TEI only
#   docker compose ps                               # Check status
#   docker compose down -v                          # Stop and remove volumes
#
# GPU services (TEI) require NVIDIA Container Toolkit.
# See docs/developer_workflow.md for installation instructions.

services:
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"   # REST API
      - "6334:6334"   # gRPC
    volumes:
      - qdrant_data:/qdrant/storage
    deploy:
      resources:
        limits:
          memory: 512M
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/6333'"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  opensearch:
    image: opensearchproject/opensearch:2
    environment:
      - discovery.type=single-node
      - DISABLE_SECURITY_PLUGIN=true
      - "OPENSEARCH_JAVA_OPTS=-Xms256m -Xmx256m"
    ports:
      - "9200:9200"
    volumes:
      - opensearch_data:/usr/share/opensearch/data
    deploy:
      resources:
        limits:
          memory: 512M
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  postgres:
    image: postgres:16
    environment:
      - POSTGRES_USER=drifter
      - POSTGRES_PASSWORD=drifter
      - POSTGRES_DB=drifter
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    deploy:
      resources:
        limits:
          memory: 256M
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U drifter"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      - MINIO_ROOT_USER=drifter
      - MINIO_ROOT_PASSWORD=drifter123
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Console UI
    volumes:
      - minio_data:/data
    deploy:
      resources:
        limits:
          memory: 256M
    healthcheck:
      test: ["CMD-SHELL", "mc ready local || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  minio-create-bucket:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 drifter drifter123;
      mc mb --ignore-existing local/langfuse;
      exit 0;
      "

  jaeger:
    image: jaegertracing/all-in-one:latest
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    ports:
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP
      - "16686:16686" # Jaeger UI
    deploy:
      resources:
        limits:
          memory: 256M
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:16686/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  # TEI — GPU-accelerated embeddings and reranking.
  # Requires NVIDIA Container Toolkit (see docs/developer_workflow.md).
  # Start with: docker compose --profile gpu up -d

  tei-embedding:
    image: ghcr.io/huggingface/text-embeddings-inference:latest
    profiles: ["gpu"]
    command: --model-id nomic-ai/nomic-embed-text-v1.5
    ports:
      - "8090:80"
    volumes:
      - tei_embedding_data:/data
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
        limits:
          memory: 2G
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:80/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s

  tei-reranker:
    image: ghcr.io/huggingface/text-embeddings-inference:latest
    profiles: ["gpu"]
    command: --model-id Alibaba-NLP/gte-reranker-modernbert-base
    ports:
      - "8091:80"
    volumes:
      - tei_reranker_data:/data
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
        limits:
          memory: 4G
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:80/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s

  # -- Langfuse dependencies --

  langfuse-clickhouse:
    image: clickhouse/clickhouse-server:latest
    environment:
      - CLICKHOUSE_DB=langfuse
      - CLICKHOUSE_USER=langfuse
      - CLICKHOUSE_PASSWORD=langfuse
    volumes:
      - langfuse_clickhouse_data:/var/lib/clickhouse
    deploy:
      resources:
        limits:
          memory: 1G
    healthcheck:
      test: ["CMD-SHELL", "clickhouse-client --query 'SELECT 1'"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  langfuse-redis:
    image: redis:7
    command: --requirepass drifter-redis
    ports:
      - "6379:6379"
    deploy:
      resources:
        limits:
          memory: 128M
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "drifter-redis", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  langfuse:
    image: langfuse/langfuse:3
    depends_on:
      postgres:
        condition: service_healthy
      langfuse-clickhouse:
        condition: service_healthy
      langfuse-redis:
        condition: service_healthy
    ports:
      - "3000:3000"   # Langfuse UI
    environment: &langfuse-env
      - DATABASE_URL=postgresql://drifter:drifter@postgres:5432/drifter
      - NEXTAUTH_SECRET=drifter-langfuse-dev-secret
      - SALT=drifter-langfuse-dev-salt
      - NEXTAUTH_URL=http://localhost:3000
      - ENCRYPTION_KEY=a1b2c3d4e5f6a7b8c9d0e1f2a3b4c5d6e7f8a9b0c1d2e3f4a5b6c7d8e9f0a1b2
      - TELEMETRY_ENABLED=false
      # ClickHouse
      - CLICKHOUSE_URL=http://langfuse-clickhouse:8123
      - CLICKHOUSE_MIGRATION_URL=clickhouse://langfuse-clickhouse:9000
      - CLICKHOUSE_USER=langfuse
      - CLICKHOUSE_PASSWORD=langfuse
      - CLICKHOUSE_CLUSTER_ENABLED=false
      # Redis
      - REDIS_CONNECTION_STRING=redis://:drifter-redis@langfuse-redis:6379
      # S3 (MinIO) — event, media, and batch export buckets
      - LANGFUSE_S3_EVENT_UPLOAD_BUCKET=langfuse
      - LANGFUSE_S3_EVENT_UPLOAD_REGION=auto
      - LANGFUSE_S3_EVENT_UPLOAD_ACCESS_KEY_ID=drifter
      - LANGFUSE_S3_EVENT_UPLOAD_SECRET_ACCESS_KEY=drifter123
      - LANGFUSE_S3_EVENT_UPLOAD_ENDPOINT=http://minio:9000
      - LANGFUSE_S3_EVENT_UPLOAD_FORCE_PATH_STYLE=true
      - LANGFUSE_S3_EVENT_UPLOAD_PREFIX=events/
      - LANGFUSE_S3_MEDIA_UPLOAD_BUCKET=langfuse
      - LANGFUSE_S3_MEDIA_UPLOAD_REGION=auto
      - LANGFUSE_S3_MEDIA_UPLOAD_ACCESS_KEY_ID=drifter
      - LANGFUSE_S3_MEDIA_UPLOAD_SECRET_ACCESS_KEY=drifter123
      - LANGFUSE_S3_MEDIA_UPLOAD_ENDPOINT=http://minio:9000
      - LANGFUSE_S3_MEDIA_UPLOAD_FORCE_PATH_STYLE=true
      - LANGFUSE_S3_MEDIA_UPLOAD_PREFIX=media/
      - LANGFUSE_S3_BATCH_EXPORT_ENABLED=false
      # Auto-init org, project, and user
      - LANGFUSE_INIT_ORG_ID=drifter-org
      - LANGFUSE_INIT_ORG_NAME=Drifter
      - LANGFUSE_INIT_PROJECT_ID=drifter-project
      - LANGFUSE_INIT_PROJECT_NAME=Drifter RAG
      - LANGFUSE_INIT_PROJECT_PUBLIC_KEY=pk-lf-drifter-dev
      - LANGFUSE_INIT_PROJECT_SECRET_KEY=sk-lf-drifter-dev
      - LANGFUSE_INIT_USER_EMAIL=admin@drifter.local
      - LANGFUSE_INIT_USER_PASSWORD=drifter123!
      - LANGFUSE_INIT_USER_NAME=Admin
    deploy:
      resources:
        limits:
          memory: 1G
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://$(hostname):3000/api/public/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s

  langfuse-worker:
    image: langfuse/langfuse-worker:3
    depends_on:
      langfuse:
        condition: service_healthy
    environment: *langfuse-env
    deploy:
      resources:
        limits:
          memory: 512M

volumes:
  qdrant_data:
  opensearch_data:
  postgres_data:
  minio_data:
  langfuse_clickhouse_data:
  tei_embedding_data:
  tei_reranker_data:
