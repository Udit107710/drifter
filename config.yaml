# Drifter RAG System Configuration
#
# Non-secret settings go here. Secrets (API keys, passwords) are loaded
# from environment variables (see .env.example).
#
# Each concern has an explicit "provider" field that selects which
# adapter to use, even if multiple are configured.

# --- Provider selection ---
generation:
  provider: vllm            # ollama | vllm | openai | openrouter | gemini

embeddings:
  provider: vllm            # tei | ollama | vllm | openrouter

reranking:
  provider: local           # local | tei | huggingface | feature

observability:
  provider: langfuse        # langfuse | otel

# --- Pipeline settings ---
token_budget: 5000
reranker_top_n: 0

retry:
  max_retries: 0
  base_delay_s: 0.5
  max_delay_s: 30.0
  jitter_factor: 0.5

# --- Adapter configurations ---
# Secrets (api_key, password, etc.) are injected from env vars.

qdrant:
  host: localhost
  port: 6333
  grpc_port: 6334
  collection_name: drifter
  timeout_s: 10.0
  use_tls: false

opensearch:
  hosts:
    - localhost:9200
  username: admin
  index_prefix: drifter
  use_ssl: false
  timeout_s: 10.0

tei:
  base_url: http://localhost:8080
  reranker_url: ""
  timeout_s: 30.0
  max_batch_size: 32

ollama:
  base_url: http://localhost:11434
  model_id: qwen3.5:9b
  timeout_s: 120.0
  num_predict: 4096
  num_ctx: 2048
  temperature: 1
  top_k: 20
  top_p: 0.9
  min_p: 0.0
  repeat_penalty: 1.1
  repeat_last_n: 64
  keep_alive: 60m

vllm:
  base_url: http://localhost:8000
  model_id: Qwen/Qwen3-14B-AWQ
  timeout_s: 120.0
  max_tokens: 4096
  temperature: 0.7
  top_k: 20
  top_p: 0.9
  min_p: 0.0
  repetition_penalty: 1.0

vllm_embeddings:
  base_url: http://localhost:8001
  model_id: nomic-ai/nomic-embed-text-v1.5
  timeout_s: 30.0
  max_batch_size: 32

